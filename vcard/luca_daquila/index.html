    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            /* 2. COLORI: Cambia l'esadecimale (#...) per abbinarlo al brand del cliente */
            --primary: #1a237e; /* Colore principale */
            --gold: #d4af37;    /* Colore accento/sfumatura */
            --light: #f4f7f6;
        }

        /* --- CSS INVARIATO --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, #0d123e 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #333; }
        .vcard-container { background: white; width: 100%; max-width: 400px; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .header-bg { height: 120px; background: linear-gradient(to right, var(--gold), #f2d06b); }
        .profile-img { width: 110px; height: 110px; background: white; border-radius: 50%; margin: -55px auto 15px; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 4px solid white; overflow: hidden; }
        .profile-img i { font-size: 3.5rem; color: var(--primary); }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; color: var(--primary); margin-bottom: 5px; }
        .job-title { font-size: 0.9rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; padding: 0 10px; }
        .actions { padding: 0 25px 25px; }
        .btn-save { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--primary); color: white; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(26, 35, 126, 0.3); transition: 0.3s; }
        .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .contact-item { text-decoration: none; color: var(--primary); display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: 600; }
        .icon-circle { width: 50px; height: 50px; background: var(--light); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; font-size: 1.2rem; }
        .social-links { border-top: 1px solid #eee; padding-top: 20px; display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: #bbb; font-size: 1.3rem; }
        .footer-brand { padding: 20px; background: var(--light); font-size: 0.7rem; color: #999; }
        .footer-brand a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
