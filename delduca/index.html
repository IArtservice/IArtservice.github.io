  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:#f5efe9;font-family:'Inter',sans-serif;color:#2c241f;min-height:100vh}.intro-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#fefaf5;z-index:10000;display:flex;align-items:center;justify-content:center;transition:opacity 0.8s cubic-bezier(0.2,0.9,0.4,1);pointer-events:none}.intro-overlay.fade-out{opacity:0;visibility:hidden}.intro-logo{width:300px;height:auto;filter:drop-shadow(0 20px 30px rgba(0,0,0,0.08));animation:introRise 0.7s ease-out}@keyframes introRise{0%{opacity:0;transform:translateY(20px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}.logo-fixed{position:fixed;top:28px;left:28px;width:100px;z-index:1000;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.1));opacity:0;transform:scale(0.92);transition:opacity 0.5s ease 0.3s,transform 0.4s ease 0.3s;pointer-events:none;cursor:pointer}.logo-fixed.visible{opacity:1;transform:scale(1);pointer-events:auto}.container{max-width:1400px;margin:0 auto;padding:2rem 1.8rem;opacity:0;transform:translateY(18px);transition:opacity 0.6s ease 0.4s,transform 0.6s ease 0.4s}.container.visible{opacity:1;transform:translateY(0)}.wedding-card{background:#ffffff;border-radius:2rem;box-shadow:0 30px 50px -20px rgba(0,0,0,0.2),0 0 0 1px rgba(224,196,158,0.2);overflow:hidden}.hero{background:linear-gradient(135deg,#fffaf5,#fff5ec);padding:2.5rem 2rem;text-align:center;border-bottom:1px solid #f0e0cf}.hero h1{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:#b45a2e;letter-spacing:-0.2px}.hero p{font-size:1rem;color:#8e6a4d;margin-top:0.5rem;font-weight:500}.progress-area{padding:1.8rem 2rem 0.5rem}.progress-track{background:#efe3d8;border-radius:40px;height:6px}.progress-fill{background:#c47a44;width:0%;height:100%;border-radius:40px;transition:width 0.4s ease}.step-counter{display:flex;justify-content:space-between;margin-top:0.8rem;font-weight:500;color:#a77b58;font-size:0.85rem}.step-content{padding:2rem 2rem 1rem;min-height:520px}.category-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#3a2a1f;display:flex;align-items:baseline;flex-wrap:wrap;gap:1rem;margin-bottom:0.3rem}.badge-cat{background:#f4e8df;font-size:0.7rem;font-weight:600;padding:0.2rem 1rem;border-radius:60px;color:#b45a2e;letter-spacing:0.3px}.sub{color:#b38b6b;margin-bottom:2rem;border-left:3px solid #e9cfb9;padding-left:1rem;font-size:0.9rem}.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;margin:2rem 0 1.5rem}.option-card{background:#fffdfb;border-radius:1.25rem;padding:1.3rem;border:1px solid #ede0d2;transition:all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);cursor:pointer;box-shadow:0 6px 12px -8px rgba(0,0,0,0.05);animation:cardReveal 0.45s backwards;animation-delay:calc(0.03s * var(--order,0))}@keyframes cardReveal{from{opacity:0;transform:translateY(14px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}.option-card:hover{transform:translateY(-5px);border-color:#cfaa83;box-shadow:0 18px 28px -12px rgba(0,0,0,0.12)}.option-card.selected{border:2px solid #c47a44;background:#fffaf4;box-shadow:0 12px 20px -12px rgba(196,122,68,0.25)}.option-name{font-weight:700;font-size:1.15rem;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:0.6rem;margin-bottom:0.5rem;color:#4b3321}.option-price{background:#f5ece3;padding:0.2rem 0.8rem;border-radius:40px;font-size:0.8rem;font-weight:700;color:#bc6a36;white-space:nowrap}.participants-area{margin-top:1rem;background:#fef7f0;border-radius:60px;padding:0.5rem 1rem;display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;font-size:0.8rem;font-weight:500}.participants-area input{width:85px;padding:0.35rem 0.6rem;border-radius:60px;border:1px solid #e2cfbc;text-align:center;font-weight:600}.opt-desc{font-size:0.7rem;color:#b4845c;margin-top:0.7rem;line-height:1.3}.nav-buttons{display:flex;justify-content:space-between;padding:0.5rem 2rem 2rem;gap:1rem;flex-wrap:wrap}button{background:#ede0d4;border:none;padding:0.8rem 2rem;font-weight:600;font-size:0.9rem;border-radius:60px;cursor:pointer;transition:0.2s;font-family:'Inter',sans-serif;color:#5a3e2c}button.primary{background:#c47a44;color:white;box-shadow:0 2px 8px rgba(0,0,0,0.05)}button.primary:hover{background:#ad6534;transform:translateY(-2px)}button.secondary:hover{background:#dfcdbd}button:disabled{opacity:0.5;cursor:default}.summary-table{background:#fffbf7;border-radius:1.5rem;padding:1.5rem;margin:1.5rem 0;border:1px solid #eedfcb}.summary-row{display:flex;justify-content:space-between;padding:0.8rem 0;border-bottom:1px solid #f0e0ce;font-size:0.9rem}.total-row{font-weight:800;font-size:1.3rem;color:#bc6a36;border-top:2px dashed #e7cfb7;margin-top:1rem;padding-top:1rem;display:flex;justify-content:space-between}.input-name{width:100%;padding:1rem 1.2rem;border-radius:60px;border:1px solid #e7d5c3;font-size:1rem;margin:1rem 0;background:white;font-family:'Inter',sans-serif}.send-group{display:flex;gap:1rem;flex-wrap:wrap}.send-btn{flex:1;background:#25D366;color:white;gap:8px;display:inline-flex;align-items:center;justify-content:center}.send-btn.email{background:#6c5ce7}.error-msg{color:#cf6f5a;font-size:0.75rem;margin-top:0.3rem}footer{text-align:center;padding:1.2rem;font-size:0.7rem;color:#bc9a7a;border-top:1px solid #f3e5d8}@media (max-width:700px){.container{padding:1rem}.hero h1{font-size:2rem}.category-title{font-size:1.6rem}.options-grid{grid-template-columns:1fr}.logo-fixed{width:70px;top:16px;left:16px}.intro-logo{width:200px}}
  </style>
</head>
<body>
<div id="introOverlay" class="intro-overlay"><img id="introLogoImg" class="intro-logo" src="delduca-logo.png" alt="DelDuca Weddings" onerror="this.src='https://placehold.co/400x200?text=DelDuca&bg=F2E3D6&color=BB6B3A'"></div>
<img id="fixedLogo" class="logo-fixed" src="delduca-logo.png" alt="DelDuca Weddings" onerror="this.src='https://placehold.co/200x100?text=DelDuca&bg=F2E3D6&color=BB6B3A'">
<div id="mainContainer" class="container">
  <div class="wedding-card">
    <div class="hero"><h1>DelDuca Weddings</h1><p>Il tuo matrimonio, raccontato con eleganza. Crea il preventivo perfetto, categoria per categoria.</p></div>
    <div class="progress-area"><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div><div class="step-counter"><span id="stepLabel"></span><span id="totalPreview" style="font-weight:600;">€ 0</span></div></div>
    <div id="dynamicStep" class="step-content"></div>
    <div class="nav-buttons" id="navButtons"></div>
    <footer>Ogni categoria può essere saltata con "Non mi interessa". Alla fine riceverai il preventivo via WhatsApp o email.</footer>
  </div>
</div>
<script>
(function(){
  const C=[{name:"Location & Ricevimento",options:[{name:"Villa Storica con Giardino",price:3500},{name:"Castello Medievale",price:4800},{name:"Spiaggia Resort esclusivo",price:4200},{name:"Agriturismo di Charme",price:2800}]},{name:"Catering (prezzo a persona)",options:[{name:"Buffet Regionale",price:65,perPerson:true},{name:"Menu Degustazione (5 portate)",price:95,perPerson:true},{name:"Cucina Fusion & Sushi",price:110,perPerson:true},{name:"Vegetariano / Vegano gourmet",price:80,perPerson:true}]},{name:"Fotografia & Video",options:[{name:"Servizio Fotografico Base",price:1200},{name:"Fotografia + Video (cortometraggio)",price:2200},{name:"Premium: album stampato + drone",price:3100},{name:"Solo video maker",price:1500}]},{name:"Intrattenimento Musicale",options:[{name:"DJ",price:500},{name:"DJ + Animazione",price:800},{name:"DJ Karaoke",price:650},{name:"DJ Animazione e Intrattenimento per bambini",price:950}]},{name:"Fiori e Allestimenti",options:[{name:"Composizione base (bouquet + centrotavola)",price:450},{name:"Allestimento chiesa/simbolico",price:780},{name:"Allestimento completo (location + arco)",price:1350},{name:"Fiori secchi/bohemien",price:620}]},{name:"Wedding Cake & Dessert",options:[{name:"Torta classica 1 piano",price:180},{name:"Torta 2 piani personalizzata",price:290},{name:"Cupcake tower (50 pz)",price:220},{name:"Millefoglie monumentale",price:340}]},{name:"Trasporto Sposi & Ospiti",options:[{name:"Auto d'epoca (per sposi)",price:350},{name:"Limusine bianca",price:490},{name:"Navetta per ospiti (fino a 20 posti)",price:600},{name:"Trasferimento VIP con autista",price:450}]},{name:"Abiti e Styling",options:[{name:"Noleggio abito sposo",price:250},{name:"Noleggio abito sposa",price:550},{name:"Sartoria su misura sposo",price:700},{name:"Makeup & Hair professionale",price:280}]},{name:"Web Designer - Sito Matrimonio",options:[{name:"Sito informativo base",price:350,desc:"One page con mappa, programma evento, modulo contatto. Design elegante e responsive."},{name:"Sito con Conferma presenza online",price:600,desc:"Modulo RSVP digitale, galleria fotografica, area riservata per gli ospiti."},{name:"Sito premium + Countdown e mappa interattiva",price:900,desc:"Timer personalizzato, mappa punti di interesse, lista nozze digitale."},{name:"Pacchetto completo + Branding esclusivo",price:1200,desc:"Logo personalizzato, coordinato grafico per inviti, assistenza completa, dominio e hosting."}]},{name:"Wedding Planner & Coordinamento",options:[{name:"Consulenza base (3 incontri)",price:650},{name:"Coordinamento day-of",price:1200},{name:"Full planning (mese + giorno)",price:2200},{name:"Assistente sposa premium",price:1700}]}];
  for(let _c of C)_c.options.push({name:"Non mi interessa / Nessuno di questi",price:0,perPerson:false});
  const T=C.length;
  let S=Array(T).fill().map(()=>({o:null,p:null})), cs=0;
  const $d=document.getElementById('dynamicStep'),$n=document.getElementById('navButtons'),$p=document.getElementById('progressFill'),$l=document.getElementById('stepLabel'),$tp=document.getElementById('totalPreview');
  const $io=document.getElementById('introOverlay'),$fl=document.getElementById('fixedLogo'),$mc=document.getElementById('mainContainer');
  function a(){let t=0;for(let i=0;i<T;i++){let s=S[i];if(s.o!==null){let o=C[i].options[s.o],pr=o.price;if(o.perPerson&&s.p&&s.p>0&&o.price!==0)pr*=s.p;else if(o.perPerson&&(!s.p||s.p<=0)&&o.price!==0)pr=0;t+=pr}}return t}
  function b(){$tp.innerText=`€ ${a().toLocaleString()}`}
  function c(){if(cs<T){$p.style.width=`${(cs/T)*100}%`;$l.innerText=`${C[cs].name} · ${cs+1}/${T}`}else{$p.style.width='100%';$l.innerText=`Riepilogo finale · ${T} categorie`}b()}
  function h(s){if(!s)return'';return s.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m})}
  function d(i){let c=C[i],d=S[i],si=d.o,sp=d.p,html='';c.options.forEach((o,idx)=>{let sel=(si===idx),cls=sel?'selected':'',pl=o.perPerson?`€ ${o.price.toLocaleString()}/persona`:`€ ${o.price.toLocaleString()}`,ex='';if(sel&&o.perPerson&&o.price!==0){let pv=(sp&&sp>0)?sp:30;ex=`<div class="participants-area"><span>Numero invitati:</span><input type="number" class="partInput" min="1" max="500" value="${pv}"><span>persone</span></div><div class="opt-desc">Il costo totale del catering sara' prezzo a persona x numero invitati</div>`;}else if(sel&&o.desc){ex=`<div class="opt-desc">${h(o.desc)}</div>`;}html+=`<div class="option-card ${cls}" data-oi="${idx}" data-pp="${o.perPerson||false}" data-pr="${o.price}"><div class="option-name"><span>${h(o.name)}</span><span class="option-price">${pl}</span></div><div id="ex-${idx}">${ex}</div></div>`;});return`<div class="category-title">${h(c.name)}<span class="badge-cat">step ${i+1} di ${T}</span></div><div class="sub">Scegli una delle proposte, oppure "Non mi interessa" per saltare questa categoria.</div><div class="options-grid" id="optionsGrid">${html}</div><div class="error-msg" id="stepError" style="display:none;">Seleziona un'opzione prima di proseguire.</div>`;}
  function e(){let g=document.getElementById('optionsGrid');if(!g)return;let crd=g.querySelectorAll('.option-card');crd.forEach((c,i)=>{c.style.setProperty('--order',i);});crd.forEach(card=>{let oi=parseInt(card.dataset.oi),isPP=card.dataset.pp==='true',opr=parseFloat(card.dataset.pr);card.addEventListener('click',(e)=>{if(e.target.tagName==='INPUT')return;crd.forEach(c=>c.classList.remove('selected'));card.classList.add('selected');S[cs].o=oi;if(isPP&&opr!==0){let cp=S[cs].p;if(!cp||cp<1)cp=30;S[cs].p=cp;let exd=card.querySelector(`#ex-${oi}`);if(exd){exd.innerHTML=`<div class="participants-area"><span>Numero invitati:</span><input type="number" class="partInput" min="1" max="500" value="${cp}"><span>persone</span></div><div class="opt-desc">Il costo totale del catering sara' prezzo a persona x numero invitati</div>`;let pin=exd.querySelector('.partInput');if(pin){pin.addEventListener('change',(e2)=>{let v=parseInt(e2.target.value);if(isNaN(v)||v<1)v=1;S[cs].p=v;b();});}}}else{S[cs].p=null;crd.forEach(c=>{let ic=parseInt(c.dataset.oi),exdc=c.querySelector(`#ex-${ic}`);if(exdc&&c!==card)exdc.innerHTML='';});let opt=C[cs].options[oi],exsl=card.querySelector(`#ex-${oi}`);if(exsl&&opt.desc&&!isPP)exsl.innerHTML=`<div class="opt-desc">${h(opt.desc)}</div>`;else if(exsl&&!isPP)exsl.innerHTML='';}b();let er=document.getElementById('stepError');if(er)er.style.display='none';});if(card.classList.contains('selected')){let pi=card.querySelector('.partInput');if(pi){pi.addEventListener('change',(e)=>{let v=parseInt(e.target.value);if(isNaN(v)||v<1)v=1;S[cs].p=v;b();});}}});}
  function f(){let pd=(cs===0),nt=(cs===T-1)?"Riepilogo finale":"Avanti";$n.innerHTML=`<button class="secondary" id="prevBtn" ${pd?'disabled':''}>← Indietro</button><button class="primary" id="nextBtn">${nt}</button>`;document.getElementById('prevBtn')?.addEventListener('click',()=>{if(cs>0){cs--;k();}});document.getElementById('nextBtn')?.addEventListener('click',()=>{let si=S[cs].o;if(si===null){let er=document.getElementById('stepError');if(er)er.style.display='block';else alert("Seleziona un'opzione o 'Non mi interessa'");return;}let opt=C[cs].options[si];if(opt.perPerson&&opt.price!==0&&(!S[cs].p||S[cs].p<1)){alert("Per il catering, inserisci il numero di partecipanti.");return;}if(cs<T-1){cs++;k();}else if(cs===T-1){cs=T;k();}});}
  function g(){let rows='',tot=0;for(let i=0;i<T;i++){let c=C[i],s=S[i];if(s.o!==null){let o=c.options[s.o],pr=o.price,pd=`€ ${o.price.toLocaleString()}`;if(o.perPerson&&s.p&&s.p>0&&o.price!==0){let bpr=o.price;pr=bpr*s.p;pd=`€ ${bpr.toLocaleString()} x ${s.p} = € ${pr.toLocaleString()}`;}else if(o.perPerson&&o.price!==0&&(!s.p||s.p<1)){pr=0;pd="Partecipanti non indicati";}tot+=pr;rows+=`<div class="summary-row"><span><strong>${h(c.name)}</strong><br><span style="font-size:0.8rem;">${h(o.name)}</span></span><span style="font-weight:600;">${pd}</span></div>`;}else{rows+=`<div class="summary-row"><span><strong>${h(c.name)}</strong><br><span style="color:#b4845c;">Nessuna scelta</span></span><span>€ 0</span></div>`;}}return`<div class="category-title">Il tuo preventivo personalizzato</div><div class="sub">Verifica le tue scelte, puoi tornare indietro e modificare qualsiasi categoria.</div><div class="summary-table">${rows}<div class="total-row"><span>TOTALE EVENTO</span><span>€ ${tot.toLocaleString()}</span></div></div><label style="font-weight:600;">Nome e Cognome (coppia)</label><input type="text" id="clientName" class="input-name" placeholder="es. Giulia e Marco" autocomplete="name"><div id="sendError" class="error-msg"></div><div class="send-group"><button id="sendWhatsBtn" class="send-btn">Invia preventivo via WhatsApp</button><button id="sendMailBtn" class="send-btn email">Invia via Email</button></div>`;}
  function m(){let back=document.getElementById('backEditBtn'),reset=document.getElementById('resetAllBtn');if(back)back.addEventListener('click',()=>{cs=T-1;k();});if(reset)reset.addEventListener('click',()=>{if(confirm('Cancellare tutte le selezioni e ricominciare?')){S=Array(T).fill().map(()=>({o:null,p:null}));cs=0;k();}});}
  function i(n){let ln=n.trim()||"Cliente",msg=`DELDUCA WEDDINGS - Preventivo\nCoppia: ${ln}\n\n`,tot=0;for(let i=0;i<T;i++){let c=C[i],s=S[i];if(s.o!==null){let o=c.options[s.o],pr=o.price,ex='';if(o.perPerson&&s.p&&s.p>0&&o.price!==0){pr*=s.p;ex=` (${o.price}€/persona x ${s.p})`;}tot+=pr;msg+=`- ${c.name}: ${o.name}${ex} -> € ${pr.toLocaleString()}\n`;}else{msg+=`- ${c.name}: nessuna selezione\n`;}}msg+=`\nTOTALE COMPLESSIVO: € ${tot.toLocaleString()}\nGrazie per averci scelto, riceverai un nostro contatto.`;return msg;}
  function j(){let ni=document.getElementById('clientName'),wb=document.getElementById('sendWhatsBtn'),eb=document.getElementById('sendMailBtn'),er=document.getElementById('sendError'),val=()=>{let nm=ni?.value.trim()||"";if(nm===""){if(er)er.innerText="Inserisci il tuo nome per inviare il preventivo.";return false}if(er)er.innerText="";return true},wn="393331395730",em="iartservizi@gmail.com";if(wb)wb.onclick=()=>{if(val()){let msg=i(ni.value);window.open(`https://wa.me/${wn}?text=${encodeURIComponent(msg)}`,'_blank');}};if(eb)eb.onclick=()=>{if(val()){let subj=`Preventivo Matrimonio - ${ni.value}`,body=i(ni.value);window.location.href=`mailto:${em}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;}};}
  function k(){if(cs<T){$d.innerHTML=d(cs);e();f();}else{$d.innerHTML=g();m();j();}c();}
  function l(){setTimeout(()=>{$io.classList.add('fade-out');$fl.classList.add('visible');$mc.classList.add('visible');},900);}
  window.addEventListener('load',l);setTimeout(()=>{if($io&&!$io.classList.contains('fade-out'))l();},1500);
  function init(){S=Array(T).fill().map(()=>({o:null,p:null}));cs=0;k();}
  init();
})();
</script>
</body>
</html>
