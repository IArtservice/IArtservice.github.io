        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f0e0c8;  /* Sfondo più scuro per aumentare il contrasto con le card bianche */
            font-family: 'Outfit', sans-serif;
            color: #2c1e12;
            padding: 0;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .menu-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: #fffaf2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-radius: 0 0 28px 28px;
            overflow: hidden;
            position: relative;
        }

        .hero {
            background: linear-gradient(145deg, #ff8c1a 0%, #ffcc33 100%);
            padding: 1.5rem 1rem 1.2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,200,0.5) 0%, rgba(255,140,26,0) 70%);
            animation: rotateGlow 12s linear infinite;
        }
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-area {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
        }

        .main-logo {
            max-width: 170px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.25));
            animation: floatLogo 6s ease-in-out infinite;
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .filter-bar {
            padding: 0.7rem 1rem;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            align-items: center;
            gap: 0.7rem;
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255, 250, 242, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 204, 136, 0.5);
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: white;
            border: 1px solid #ffcc88;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.5rem 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            color: #b45f1b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #ff8c1a, #ffcc33);
            border-color: transparent;
            color: white;
            box-shadow: 0 6px 15px rgba(255, 140, 26, 0.4);
            transform: scale(1.02) translateY(-2px);
        }

        .menu-content {
            padding: 1rem 1rem 2rem;
        }

        .category-section {
            margin-bottom: 2rem;
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b45f1b, #ff8c1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-left: 5px solid #ffaa33;
            padding-left: 0.8rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: sticky;
            top: 58px;
            z-index: 10;
            background-color: rgba(255, 250, 242, 0.95);
            padding-top: 8px;
            padding-bottom: 8px;
            backdrop-filter: blur(5px);
        }
        .category-title i {
            font-size: 1.4rem;
            color: #ff8c1a;
            -webkit-text-fill-color: initial;
            filter: drop-shadow(0 2px 4px rgba(255, 140, 26, 0.3));
        }

        .items-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 600px) {
            .items-grid { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
        }

        /* Card con contrasto aumentato */
        .menu-item-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 0.8rem 1rem;
            border: 1px solid #ffd6a0;  /* Bordo leggermente più scuro */
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08); /* Ombra più pronunciata */

            overflow: hidden;
            opacity: 0;
            transform: translateY(25px) scale(0.97);

                        transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        box-shadow 0.2s, border-color 0.2s;
        }
        
        .menu-item-card.is-visible {

        }

        .menu-item-card:active {

        }

        .ripple-effect {

            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 170, 50, 0.4) 0%, rgba(255, 140, 26, 0) 70%);
            transform: scale(0);
            animation: rippleAnim 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;

            line-height: 1.25;

            font-size: 0.75rem;

        .credit a {

            color: white;

            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;

            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            z-index: 99;
        }
        .scroll-top.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .scroll-top:active {
            transform: scale(0.9);
        }
    </style>

        bevande: "fa-glass-water",

        speciali: "fa-star"
    };
    const categoryTitles = {
        caffetteria: "Caffetteria",
        dolci: "Dolce & Pasticceria",
        salati: "Salato & Focacce",
        pranzo: "Pranzo",
        bevande: "Bevande analcoliche",
        cocktail: "Cocktail",
        viniSpritz: "Spritz, Vino & Spirit",
        birre: "Birre artigianali",
        speciali: "Specialità della Casa"
    };
    const sectionOrder = ["caffetteria", "dolci", "salati", "pranzo", "bevande", "cocktail", "viniSpritz", "birre", "speciali"];

    // Intersection Observer per animare le card allo scroll
    const observerOptions = {
        root: null,
        rootMargin: '0px 0px -40px 0px',
        threshold: 0.1
    };

    const cardObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                cardObserver.unobserve(entry.target);
            }
        });
    }, observerOptions);

    function addRipple(event, card) {
        let clientX, clientY;
        if (event.touches) {
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
        } else {
            clientX = event.clientX;
            clientY = event.clientY;
        }
        const rect = card.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = clientX - rect.left - size / 2;
        const y = clientY - rect.top - size / 2;
        const ripple = document.createElement('span');
        ripple.className = 'ripple-effect';
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        card.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    }

    function createItemCard(item) {
        const card = document.createElement("div");
        card.className = "menu-item-card";
        card.addEventListener('touchstart', (e) => addRipple(e, card), {passive: true});
        card.addEventListener('mousedown', (e) => addRipple(e, card));
        
        const header = document.createElement("div");
        header.className = "item-header";
        const nameSpan = document.createElement("span");
        nameSpan.className = "item-name";
        nameSpan.innerText = item.name;
        const priceSpan = document.createElement("span");
        priceSpan.className = "item-price";
        priceSpan.innerText = item.price;
        header.appendChild(nameSpan);
        header.appendChild(priceSpan);
        card.appendChild(header);
        
        if (item.ingredients) {
            const ing = document.createElement("div");
            ing.className = "item-ingredients";
            ing.innerHTML = `<i class="fas fa-leaf"></i> <span>${item.ingredients}</span>`;
            card.appendChild(ing);
        }
        
        cardObserver.observe(card);
        return card;
    }

    function renderMenu(activeCategory = "all") {
        const container = document.getElementById("menuContainer");
        container.innerHTML = "";
        
        for (let key of sectionOrder) {
            let shouldShow = false;
            if (activeCategory === "all") shouldShow = true;
            else if (activeCategory === "special" && key === "speciali") shouldShow = true;
            else if (activeCategory === key) shouldShow = true;
            else if (activeCategory === "cocktail" && key === "cocktail") shouldShow = true;
            else if (activeCategory === "viniSpritz" && key === "viniSpritz") shouldShow = true;
            else if (activeCategory === "birre" && key === "birre") shouldShow = true;
            else if (activeCategory === "pranzo" && key === "pranzo") shouldShow = true;
            
            if (!shouldShow) continue;
            
            const items = menuData[key];
            if (!items || items.length === 0) continue;
            
            const section = document.createElement("div");
            section.className = "category-section";
            section.innerHTML = `
                <div class="category-title">
                    <i class="fas ${categoryIcons[key]}"></i>
                    <span>${categoryTitles[key]}</span>
                </div>
                <div class="items-grid" id="grid-${key}"></div>
            `;
            container.appendChild(section);
            const grid = section.querySelector(`.items-grid`);
            items.forEach((item) => {
                grid.appendChild(createItemCard(item));
            });
            
            if (key === "birre") {
                const note = document.createElement("div");
                note.className = "info-note";
                note.innerHTML = "<i class='fas fa-info-circle'></i> Misure: piccola (20cl) / media (40cl) – alla spina";
                grid.appendChild(note);
            }
            if (key === "cocktail") {
                const note = document.createElement("div");
                note.className = "info-note";
                note.innerHTML = "<i class='fas fa-sparkles'></i> Ingredienti freschi · Chiedi variazioni al bartender";
                grid.appendChild(note);
            }
        }
    }

    function initFilters() {
        const btns = document.querySelectorAll(".filter-btn");
        const filterBar = document.getElementById("filterBar");
        
        btns.forEach(btn => {
            btn.addEventListener("click", function() {
                const cat = this.getAttribute("data-cat");
                btns.forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                renderMenu(cat);
                
                const scrollPos = this.offsetLeft - (filterBar.offsetWidth / 2) + (this.offsetWidth / 2);
                filterBar.scrollTo({ left: scrollPos, behavior: 'smooth' });
                
                setTimeout(() => {
                    document.getElementById("filterBar").scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 50);
            });
        });
    }

    const scrollBtn = document.getElementById("scrollTopBtn");
    window.addEventListener("scroll", () => {
        if (window.scrollY > 300) scrollBtn.classList.add("show");
        else scrollBtn.classList.remove("show");
    }, {passive: true});
    
    scrollBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    renderMenu("all");
    initFilters();
</script>
</body>
</html>
